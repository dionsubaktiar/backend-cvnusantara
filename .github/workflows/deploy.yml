name: Deploy Laravel Subdomain

on:
  push:
    branches:
      - main # Jalankan deployment saat ada push ke branch main/master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2" # Sesuaikan dengan versi PHP server Anda
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Install Composer Dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader --no-dev

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Pindah ke direktori subdomain Laravel Anda
            echo "=== Current Working Directory ==="
            pwd

            echo "=== Home Directory Contents ==="
            ls -la

            echo "=== Finding artisan file on the server ==="
            find ~ -maxdepth 4 -name "artisan" 2>/dev/null

            echo "=== Finding backend directory on the server ==="
            find ~ -maxdepth 4 -type d -name "*backend*" 2>/dev/null

            exit 1
