name: Deploy Laravel Subdomain

on:
  push:
    branches:
      - main # Jalankan deployment saat ada push ke branch main/master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2" # Sesuaikan dengan versi PHP server Anda
          extensions: mbstring, xml, ctype, iconv, mysql, zip

      - name: Install Composer Dependencies
        run: composer install --no-progress --no-suggest --prefer-dist --optimize-autoloader --no-dev

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Pindah ke direktori subdomain Laravel Anda
            cd ~/domains/rinsgloballogistic.com/public_html/backend

            # Ambil kode terbaru dari github
            git pull origin main

            # Install/update dependensi di server
            composer install --no-dev --optimize-autoloader

            # Buat file .env jika belum ada
            if [ ! -f .env ]; then
                cp .env.example .env
                php artisan key:generate
            fi

            # Set database credentials di .env
            sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=mysql/' .env
            sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
            sed -i 's/^DB_PORT=.*/DB_PORT=3306/' .env
            sed -i 's/^DB_DATABASE=.*/DB_DATABASE=u288448786_backend/' .env
            sed -i 's/^DB_USERNAME=.*/DB_USERNAME=u288448786_backend/' .env
            if grep -q "^DB_PASSWORD=" .env; then
                sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=A!5uCY8Y!I/' .env
            else
                echo "DB_PASSWORD=A!5uCY8Y!I" >> .env
            fi

            # Aktifkan mode maintenance (opsional, agar user tidak error saat deploy)
            php artisan down || true

            # Jalankan migrasi database dan seeder
            # --force wajib digunakan agar bisa berjalan di mode production tanpa interaksi prompt
            php artisan migrate --force
            php artisan db:seed --force

            # Clear cache agar konfigurasi terbaru terbaca
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Matikan mode maintenance
            php artisan up
